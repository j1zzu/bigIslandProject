<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Большой Уссурийский — геопортал</title>
  <link rel="preconnect" href="https://unpkg.com">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="topbar">
    <div><span class="eyebrow">Локальный геопортал</span><h1>Большой Уссурийский остров</h1></div>
    <div id="qgis-status" class="status pending"><span></span>QGIS: проверка…</div>
  </header>
  <main>
    <aside class="panel" aria-label="Управление картой">
      <section>
        <h2>Слои</h2>
        <label><input id="toggle-basemap" type="checkbox" checked> Карта OpenStreetMap</label>
        <label><input id="toggle-wms" type="checkbox"> Дополнительный WMS</label>
        <label><input id="toggle-geojson" type="checkbox" checked> Локальные зоны</label>
        <label><input id="toggle-wfs" type="checkbox"> Зоны WFS</label>
        <label><input id="toggle-boundaries" type="checkbox"> Границы WFS</label>
      </section>
      <button id="fit-island" type="button">Показать остров</button>
      <section class="map-info">
        <h2>Карта</h2>
        <dl><dt>CRS карты</dt><dd id="crs">—</dd><dt>CRS данных</dt><dd id="data-crs">—</dd><dt>Координаты</dt><dd id="coordinates">—</dd><dt>Масштаб</dt><dd id="zoom">—</dd></dl>
      </section>
      <p id="message" class="message" role="status"></p>
    </aside>
    <div id="map" aria-label="Интерактивная карта"></div>
  </main>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="/js/app.js"></script>
</body>
</html>
